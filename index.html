<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>טנקים נגד טנקים</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; display: none; }
        canvas { border: 3px solid #ffcc00; background-color: #050510; display: block; max-width: 95vw; height: auto; }
        .panel { background-color: #222; padding: 25px; border: 2px solid #ffcc00; border-radius: 10px; text-align: center; width: 380px; }
        button { background-color: #ffcc00; color: #000; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; margin: 10px; cursor: pointer; border-radius: 5px; }
        .color-dot { display: inline-block; width: 40px; height: 30px; margin: 5px; border: 2px solid #555; cursor: pointer; border-radius: 4px; }
        .color-dot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; }
        .share-row { display: flex; gap: 5px; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-panel" class="panel">
        <h2>📝 טנקים נגד טנקים</h2>
        <label>כינוי קרב:</label>
        <input type="text" id="player-name" value="צהובי">
        <label>בחר צבע מותג:</label>
        <div id="color-grid">
            <div class="color-dot selected" style="background:#ffcc00" onclick="selectColor(this, '#ffcc00')"></div>
            <div class="color-dot" style="background:#ff3333" onclick="selectColor(this, '#ff3333')"></div>
            <div class="color-dot" style="background:#00ff00" onclick="selectColor(this, '#00ff00')"></div>
            <div class="color-dot" style="background:#33ccff" onclick="selectColor(this, '#33ccff')"></div>
            <div class="color-dot" style="background:#ffffff" onclick="selectColor(this, '#ffffff')"></div>
            <div class="color-dot" style="background:#111; border: 2px dashed #ffcc00" onclick="selectColor(this, '#111')"></div>
        </div>
        <button onclick="joinLobby()">התחבר ללובי</button>
        <div class="share-row">
            <input type="text" id="share-link" readonly>
            <button onclick="copyLink()">📋 העתק</button>
        </div>
    </div>

    <div id="lobby-panel" class="panel" style="display:none;">
        <h2>⚙️ הגדרות זירה</h2>
        <label>סה"כ שחקנים (כולל בוטים):</label>
        <select id="total-players">
            <option value="2">2</option><option value="3">3</option><option value="4">4</option>
            <option value="5">5</option><option value="6">6</option>
        </select>
        <label>כמות בוטים (מחשב):</label>
        <select id="ai-count">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
            <option value="4">4</option><option value="5">5</option>
        </select>
        <button onclick="startGame()">שגר משחק!</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        let socket, gameActive = false, players = {}, chosenColor = '#ffcc00';
        
        function selectColor(el, color) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            chosenColor = color;
        }

        function copyLink() {
            const input = document.getElementById('share-link');
            input.select();
            document.execCommand('copy');
            alert('הקישור הועתק!');
        }

        document.getElementById('share-link').value = window.location.origin;

        function joinLobby() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('lobby-panel').style.display = 'block';
            socket = io();
            socket.emit('joinLobby', { name: document.getElementById('player-name').value, color: chosenColor });
        }

        function startGame() {
            socket.emit('startConfiguredGame', { 
                totalPlayers: document.getElementById('total-players').value, 
                aiCount: document.getElementById('ai-count').value 
            });
        }

        socket = io();
        socket.on('gameStarted', (data) => {
            players = data.players;
            document.getElementById('lobby-panel').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            gameActive = true;
            draw();
        });

        socket.on('nextTurn', (data) => {
            if(players[data.currentTurnId]?.isAi) {
                setTimeout(() => {
                    socket.emit('fire', { vx: (Math.random()-0.5)*10, vy: -5, wType: "normal" });
                }, 800);
            }
        });

        function draw() {
            if(!gameActive) return;
            const ctx = document.getElementById('gameCanvas').getContext('2d');
            ctx.clearRect(0,0,800,500);
            ctx.fillStyle = '#3a2512'; ctx.fillRect(0, 400, 800, 100);
            for(let id in players) {
                let p = players[id];
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, 370, 30, 20); // גוף
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x + 10, 360, 10, 10); // תותח
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
