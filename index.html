<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <style>
        body { 
            background-color: #222; display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: sans-serif; 
        }
        #game-container { position: relative; width: 1200px; height: 800px; background: #000; border: 4px solid #fff; }
        
        .ui-overlay {
            position: absolute; top: 0; left: 0; width: 1200px; height: 800px;
            z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.9); color: white;
        }
        .btn { padding: 15px 30px; margin: 10px; cursor: pointer; background: #FFD700; border: none; font-size: 20px; font-weight: bold; }
        .btn:hover { background: #ffaa00; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay" class="ui-overlay"></div>
    <canvas id="gameCanvas" width="1200" height="800"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiOverlay = document.getElementById('ui-overlay');
    
    // הגדרה בסיסית למשחק
    let gameActive = false;

    function showStartScreen() {
        uiOverlay.style.display = "flex";
        uiOverlay.innerHTML = `
            <h1 style="font-size: 60px; color: #FFD700;">אדמה חרוכה</h1>
            <div style="margin-bottom: 20px;">בחר כמות שחקנים:</div>
            <div id="buttons" style="display: flex; flex-wrap: wrap; justify-content: center; max-width: 800px;">
                <button class="btn" onclick="startGame(2)">2 שחקנים</button>
                <button class="btn" onclick="startGame(3)">3 שחקנים</button>
                <button class="btn" onclick="startGame(4)">4 שחקנים</button>
                <button class="btn" onclick="startGame(5)">5 שחקנים</button>
                <button class="btn" onclick="startGame(6)">6 שחקנים</button>
            </div>
        `;
    }

    function startGame(players) {
        gameActive = true; // כאן אנחנו מפעילים את המשחק!
        uiOverlay.style.display = "none";
        console.log("משחק מתחיל עם " + players + " שחקנים");
        
        // כאן אתה יכול להוסיף את קריאות ה-Setup שלך
        // initTanks(players); 
        
        gameLoop(); // מתחילים את הלופ
    }

    function gameLoop() {
        if (!gameActive) return; // אם המשחק לא פעיל, אל תצייר

        // 1. ניקוי המסך
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 1200, 800);

        // 2. כאן יבואו הפונקציות שלך:
        // drawTerrain(); 
        // drawTanks();
        // drawPlane();
        
        // ציור בדיקה כדי לראות שהלופ עובד
        ctx.fillStyle = "white";
        ctx.fillText("המשחק רץ! הטנקים יופיעו כאן בקרוב.", 500, 400);

        // 3. לופ אינסופי
        requestAnimationFrame(gameLoop);
    }

    // הפעלה ראשונית
    showStartScreen();
</script>
</body>
</html>
