<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>טנקים נגד טנקים - מהדורת 6 שחקנים עם כפתורי מגע לנייד</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; display: none; }
        canvas { border: 3px solid #ffcc00; background-color: #050510; display: block; max-width: 100vw; height: auto; }
        
        .ui-bar { position: absolute; top: 10px; width: calc(100% - 40px); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 0 20px; pointer-events: none; font-family: monospace; }
        .ui-panel-box { background: rgba(0, 0, 0, 0.85); border: 2px solid #ffcc00; padding: 5px 10px; border-radius: 4px; min-width: 110px; text-align: center; box-shadow: 0 0 10px rgba(255, 204, 0, 0.1); }
        .ui-panel-box h3 { margin: 0 0 2px 0; font-size: 13px; text-shadow: 1px 1px #000; }
        .ui-panel-box div { font-size: 11px; margin: 1px 0; }
        .active-turn-box { border-color: #00ff00 !important; box-shadow: 0 0 15px #00ff00 !important; }

        #turn-timer-display { background: #000; border: 3px double #ffcc00; color: #ffcc00; font-size: 24px; font-weight: bold; padding: 5px 15px; border-radius: 4px; min-width: 50px; text-align: center; text-shadow: 0 0 8px #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); }

        #status { margin-top: 10px; font-size: 18px; font-weight: bold; color: #ffcc00; display: none; text-align: center; }
        #controls-info { margin-top: 5px; font-size: 13px; color:#aaa; display: none; text-align: center; line-height: 1.5; }
        
        .panel { background-color: #222; padding: 25px; border: 2px solid #ffcc00; border-radius: 10px; text-align: center; width: 380px; max-width: 90vw; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); box-sizing: border-box; }
        h2 { margin-top: 0; color: #ffcc00; font-size: 22px; }
        label { display: block; text-align: right; margin: 8px 0 4px 0; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; background: #333; color: #fff; border: 1px solid #ffcc00; border-radius: 4px; font-size: 14px; }
        
        button { background-color: #ffcc00; color: #000; border: none; padding: 10px 20px; font-size: 15px; font-weight: bold; margin: 12px 4px 0 4px; cursor: pointer; border-radius: 5px; transition: 0.2s; box-shadow: 3px 3px 0px #997a00; }
        button:hover { background-color: #ffee55; transform: scale(1.03); }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #997a00; }
        
        .color-picker-grid { display: flex; justify-content: space-between; gap: 6px; margin: 10px 0 15px 0; background: #111; padding: 8px; border-radius: 6px; border: 1px solid #444; }
        .color-dot { display: block; width: 45px; height: 35px; border: 2px solid #444; cursor: pointer; border-radius: 4px; transition: 0.1s; }
        .color-dot:hover { transform: scale(1.08); border-color: #aaa; }
        .color-dot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; transform: scale(1.05); }

        .share-container { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #555; display: flex; flex-direction: column; align-items: center; }
        .share-label { font-size: 12px; color: #aaa; margin-bottom: 6px; font-weight: bold; text-align: center; }
        .share-row { display: flex; width: 100%; gap: 5px; }
        .share-link-input { font-family: monospace; background: #111; color: #ffcc00; border: 1px solid #444; padding: 6px; font-size: 12px; border-radius: 4px; text-align: center; pointer-events: none; width: 70%; }
        .btn-copy { background: #333; color: #ffcc00; border: 1px solid #ffcc00; padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 30%; box-shadow: none; margin: 0; }

        #respawn-select-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5; align-items: center; justify-content: center; }
        .tank-option { background: #333; border: 1px solid #555; padding: 10px; margin: 8px 0; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: right; }
        .tank-option:hover { border-color: #ffcc00; background: #3c3c3c; }

        #game-over-screen { display: none; position: absolute; z-index: 10; background-color: rgba(10, 10, 15, 0.95); border: 4px double #ffcc00; padding: 30px; text-align: center; min-width: 350px; box-shadow: 0 0 30px #ff3333; }
        .game-over-title { font-size: 30px; font-weight: bold; color: #ff3333; margin-bottom: 15px; }
        .stats-table { width: 100%; margin: 15px 0; border-collapse: collapse; text-align: right; font-size: 13px; }
        .stats-table th { color: #ffcc00; border-bottom: 2px solid #ffcc00; padding: 6px; }
        .stats-table td { padding: 6px; border-bottom: 1px solid #444; }

        #mobile-controls { display: none; width: 100%; max-width: 800px; justify-content: space-between; padding: 10px 20px; box-sizing: border-box; background: #151515; border-top: 2px solid #ffcc00; margin-top: auto; }
        .touch-group { display: grid; gap: 8px; }
        .left-dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 45px); }
        .right-buttons { grid-template-columns: repeat(4, 50px); grid-template-rows: repeat(2, 45px); justify-items: center; align-items: center; }
        
        .touch-btn { background: #222; color: #ffcc00; border: 2px solid #ffcc00; font-size: 16px; font-weight: bold; border-radius: 6px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; cursor: pointer; touch-action: manipulation; }
        .touch-btn:active { background: #ffcc00; color: #000; }
        .btn-fire-mobile { background: #cc2222; color: #fff; border-color: #ff3333; grid-column: span 2; grid-row: span 2; font-size: 18px; text-shadow: 1px 1px #000; height: 100%; }
        .btn-fire-mobile:active { background: #ff3333; color: #fff; }
        .btn-active-toggle { background: #9400d3; color: #fff; border-color: #ba55d3; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-panel" class="panel">
        <h2>📝 טנקים נגד טנקים - רישום</h2>
        <label>כינוי קרב:</label>
        <input type="text" id="player-name-input" value="צהובי">
        
        <label>בחר צבע מותג:</label>
        <div class="color-picker-grid">
            <div class="color-dot selected" style="background-color:#ffcc00" onclick="pickColor(this, '#ffcc00')"></div>
            <div class="color-dot" style="background-color:#ff3333" onclick="pickColor(this, '#ff3333')"></div>
            <div class="color-dot" style="background-color:#00ff00" onclick="pickColor(this, '#00ff00')"></div>
            <div class="color-dot" style="background-color:#33ccff" onclick="pickColor(this, '#33ccff')"></div>
            <div class="color-dot" style="background-color:#ffffff" onclick="pickColor(this, '#ffffff')"></div>
            <div class="color-dot" style="background-color:#222222; border: 2px dashed #ffcc00" onclick="pickColor(this, '#222222')"></div>
        </div>

        <button onclick="connectToLobby()">התחבר ללובי המשחק 🌐</button>

        <div class="share-container">
            <div class="share-label">🔗 שלח לחבר כדי שישחק איתך אונליין:</div>
            <div class="share-row">
                <input type="text" id="share-link-field" class="share-link-input" value="טוען קישור...">
                <button id="copy-link-btn" class="btn-copy" onclick="copyGameUrl()">📋 העתק</button>
            </div>
        </div>
    </div>

    <div id="lobby-panel" class="panel" style="display:none;">
        <h2>⚙️ טנקים נגד טנקים - הגדרות זירה</h2>
        <div id="lobby-connected-list" style="font-size:13px; background:#111; padding:10px; border-radius:4px; text-align:right; margin-bottom:15px;">שחקנים מחוברים: טוען...</div>
        
        <label>סה"כ שחקנים בזירה:</label>
        <select id="total-players-select"><option value="2" selected>2 משתתפים</option><option value="3">3 משתתפים</option><option value="4">4 משתתפים</option></select>

        <label>דרגת קושי בוטים (AI):</label>
        <select id="ai-difficulty-select">
            <option value="easy">קל - טיפש</option>
            <option value="medium" selected>בינוני - רגיל</option>
            <option value="hard">קשה - חכם</option>
        </select>

        <label>בחר דגם טנק פתיחה:</label>
        <select id="start-tank-type">
            <option value="medium">🚀 טנק צייד (Medium - 100 HP)</option>
            <option value="heavy">🐘 טנק ממותה (Heavy - 150 HP)</option>
            <option value="light">⚡ טנק זיקית (Light - 75 HP)</option>
        </select>

        <button onclick="startGameEngine()">שגר משחק לאוויר! 🚀</button>
    </div>

    <div id="game-container">
        <div id="respawn-select-overlay">
            <div class="panel" style="max-width: 380px; border-color: #ff3333; background: #1a1a24;">
                <h3 style="color: #ff3333; margin-top: 0; font-size:18px;">💥 הטנק שלך נהרס! 💥</h3>
                <div class="tank-option" onclick="executeRespawn('medium')"><strong>🚀 טנק צייד</strong></div>
                <div class="tank-option" onclick="executeRespawn('heavy')"><strong>🐘 טנק ממותה</strong></div>
                <div class="tank-option" onclick="executeRespawn('light')"><strong>⚡ טנק זיקית</strong></div>
            </div>
        </div>
        <div id="dynamic-ui-bar" class="ui-bar"></div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div id="game-over-screen">
        <div id="go-title" class="game-over-title">GAME OVER</div>
        <h3 id="go-winner" style="color: #ffcc00; margin-bottom: 15px;">שחקן ניצח!</h3>
        <button onclick="location.reload()">🔄 משחק חדש</button>
    </div>

    <div id="mobile-controls">
        <div class="touch-group left-dpad">
            <div></div><div class="touch-btn" id="m-up">▲</div><div></div>
            <div class="touch-btn" id="m-left">◀</div><div class="touch-btn" id="m-shift" style="font-size:12px;">SHIFT</div><div class="touch-btn" id="m-right">▶</div>
            <div></div><div class="touch-btn" id="m-down">▼</div><div></div>
        </div>
        <div class="touch-group right-buttons">
            <div class="touch-btn" id="m-w1">1</div><div class="touch-btn" id="m-w2">2</div><div class="touch-btn" id="m-w3">3</div><div></div>
            <div class="touch-btn btn-fire-mobile" id="m-fire">FIRE</div>
        </div>
    </div>

    <div id="status">טוען...</div>
    <div id="controls-info"><strong>🔥 אש:</strong> רווח | <strong>🎒 נשקים:</strong> [1-3] | <strong>🚙 תנועה:</strong> Shift + חצים</div>

<script>
let socket, myId = '', gameActive = false, currentTurnId = null, gamePlayers = {}, turnOrder = [], projectile = null, aiDifficulty = 'medium';
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), statusDiv = document.getElementById('status'), TANK_TYPES = { medium: { width: 24, height: 12, maxHp: 100 }, heavy: { width: 34, height: 16, maxHp: 150 }, light: { width: 16, height: 8, maxHp: 75 } };
let terrain = [], myAngle = 45, myPower = 50, selectedWeaponKey = 1;

function connectToLobby() {
    const pName = document.getElementById('player-name-input').value;
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('lobby-panel').style.display = 'block';
    socket = io();
    socket.on('connect', () => { myId = socket.id; socket.emit('joinLobby', { name: pName, color: '#ffcc00' }); });
    socket.on('gameStarted', (data) => {
        gamePlayers = data.players; turnOrder = data.turnOrder; currentTurnId = data.currentTurnId;
        aiDifficulty = document.getElementById('ai-difficulty-select').value;
        for (let x = 0; x < canvas.width; x++) terrain[x] = 380 + Math.sin(x * 0.015) * 45;
        document.getElementById('lobby-panel').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        gameActive = true; requestAnimationFrame(draw); checkAndRunAiTurn();
    });
    socket.on('playerFired', (data) => {
        const p = gamePlayers[data.id];
        projectile = { x: p.x, y: terrain[Math.floor(p.x)] - TANK_TYPES[p.type].height, vx: data.vx, vy: data.vy, owner: data.id, wType: data.wType };
    });
}

function checkAndRunAiTurn() {
    if (!gameActive || !gamePlayers[currentTurnId] || !gamePlayers[currentTurnId].isAi) return;
    statusDiv.innerText = `המחשב מנתח...`;
    setTimeout(() => {
        const ai = gamePlayers[currentTurnId];
        let target = Object.values(gamePlayers).find(p => p.id !== ai.id && p.hp > 0);
        if (!target) return;
        
        // חישוב דרגת קושי
        let error = aiDifficulty === 'easy' ? 20 : (aiDifficulty === 'medium' ? 8 : 0);
        let angle = ai.x > target.x ? 135 : 45;
        let power = 50 + (Math.random() * error) - (error / 2);
        
        statusDiv.innerText = `המחשב מכוון ויורה...`;
        setTimeout(() => {
            const rad = (angle * Math.PI) / 180;
            const speed = power * 0.12;
            socket.emit('fire', { vx: Math.cos(rad) * speed, vy: -Math.sin(rad) * speed, wType: 'normal' });
        }, 3000);
    }, 2000);
}

function draw() {
    if (!gameActive) return;
    ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#3a2512'; ctx.beginPath(); ctx.moveTo(0, canvas.height);
    for (let x = 0; x < canvas.width; x++) ctx.lineTo(x, terrain[x]);
    ctx.lineTo(canvas.width, canvas.height); ctx.fill();
    for (let id in gamePlayers) {
        const p = gamePlayers[id];
        ctx.fillStyle = p.color; ctx.fillRect(p.x - 10, terrain[Math.floor(p.x)] - 15, 20, 10);
    }
    if (projectile) {
        projectile.vy += 0.15; projectile.x += projectile.vx; projectile.y += projectile.vy;
        ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(projectile.x, projectile.y, 5, 0, Math.PI * 2); ctx.fill();
        if (projectile.y > terrain[Math.floor(projectile.x)]) { projectile = null; socket.emit('aiFinishedTurn'); }
    }
    requestAnimationFrame(draw);
}

function startGameEngine() { socket.emit('startConfiguredGame', { aiDifficulty: document.getElementById('ai-difficulty-select').value }); }
window.onload = function() { initializeShareLink(); };
</script>
</body>
</html>
