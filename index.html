<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>אדמה חרוכה - צהובי</title>
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
        }
        canvas {
            background-color: #000;
            border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 500px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            box-sizing: border-box;
            direction: rtl;
        }
        .retro-title {
            font-size: 50px;
            color: #FFD700;
            text-shadow: 4px 4px #FF4500, 8px 8px #000;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .btn {
            background-color: #333;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
            font-family: Arial, sans-serif;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #FFD700;
            color: black;
            border-color: #FFD700;
            transform: scale(1.05);
        }
        .names-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            max-width: 750px;
            max-height: 240px;
            overflow-y: auto;
            padding-left: 10px;
        }
        .name-input-group {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.75);
            padding: 6px 12px;
            border: 1px solid #555;
        }
        .name-input-group label {
            width: 70px;
            font-size: 14px;
            text-align: right;
            font-weight: bold;
        }
        .name-input-group input {
            background: #222;
            border: 1px solid white;
            color: white;
            padding: 5px;
            font-size: 14px;
            width: 100px;
            text-align: center;
            margin-left: 10px;
        }
        .name-input-group select {
            background: #333;
            border: 1px solid white;
            color: white;
            padding: 4px;
            font-size: 14px;
            margin-left: 8px;
        }
        .respawn-box {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #FFD700;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px #FFD700;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="uiOverlay" class="ui-overlay"></div>
    </div>
<script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const uiOverlay = document.getElementById("uiOverlay");
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        const terrain = [];

        // --- הוספת המטוס ---
        let plane = { x: -100, y: 50, speed: 2 };

        // --- מערכת סאונד רטרו ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playShootSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "square";
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playExplosionSound() {
            const bufferSize = audioCtx.sampleRate * 0.4;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.setValueAtTime(300, audioCtx.currentTime);
            filter.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.4);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.4);
        }

        function playVictoryFanfare() {
            const now = audioCtx.currentTime;
            const notes = [{ f: 261.63, d: 0.10 }, { f: 329.63, d: 0.10 }, { f: 392.00, d: 0.10 }, { f: 523.25, d: 0.50 }];
            let currentOffset = 0;
            notes.forEach(note => {
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc1.type = "square";
                osc2.type = "triangle";
                osc1.frequency.setValueAtTime(note.f, now + currentOffset);
                osc2.frequency.setValueAtTime(note.f * 1.005, now + currentOffset);
                gain.gain.setValueAtTime(0.15, now + currentOffset);
                gain.gain.linearRampToValueAtTime(0.01, now + currentOffset + note.d);
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                osc1.start(now + currentOffset);
                osc2.start(now + currentOffset);
                osc1.stop(now + currentOffset + note.d);
                osc2.stop(now + currentOffset + note.d);
                currentOffset += note.d + 0.02;
            });
        }

        let gameState = "START_SCREEN"; 
        let playerCount = 2;
        const playerColors = ["#FFD700", "#00FF00", "#00FFFF", "#FF00FF", "#FF4500", "#9370DB"];
        const defaultNames = ["צהובי", "בוט א'", "בוט ב'", "בוט ג'", "בוט ד'", "בוט ה'"];
        let players = [];
        let currentPlayerIndex = 0;
        let gameActive = true;
        let winnerName = "";
        let botTimer = null;
        let playerWaitingForRespawnIndex = null;
        let totalShotsFired = 0;
        const GRAVITY = 0.15;
        let wind = 0;
        let activeMissiles = [];
        let activeExplosions = [];
        let activeOilPuddles = [];

        function showStartScreen() {
            gameState = "START_SCREEN";
            uiOverlay.innerHTML = `
                <div class="retro-title">אדמה חרוכה</div>
                <div style="font-size: 20px; margin-bottom: 15px;">בחר כמות שחקנים:</div>
                <div>
                    <button class="btn" onclick="selectPlayerCount(2)">2 טנקים</button>
                    <button class="btn" onclick="selectPlayerCount(3)">3 טנקים</button>
                    <button class="btn" onclick="selectPlayerCount(4)">4 טנקים</button>
                </div>
            `;
        }
function selectPlayerCount(count) { playerCount = count; showNamesScreen(); }

        function showNamesScreen() {
            gameState = "NAMES_SCREEN";
            let inputsHTML = "";
            for (let i = 0; i < playerCount; i++) {
                inputsHTML += `
                    <div class="name-input-group">
                        <label style="color: ${playerColors[i]}">טנק ${i+1}:</label>
                        <input type="text" id="pName${i}" value="${defaultNames[i]}" maxlength="10">
                        <select id="pSize${i}"><option value="small">קטן</option><option value="medium" selected>בינוני</option><option value="large">גדול</option></select>
                        <select id="pType${i}" onchange="toggleDifficultyVisibility(${i})"><option value="human">שחקן</option><option value="bot">מחשב</option></select>
                        <select id="pDiff${i}" style="display: none"><option value="easy">קל</option><option value="medium">בינוני</option><option value="hard">קשה</option></select>
                    </div>`;
            }
            uiOverlay.innerHTML = `<div class="retro-title">הגדרת צבאות</div><div class="names-grid">${inputsHTML}</div><button class="btn" onclick="startGame()">קרב! 🚀</button>`;
        }

        function toggleDifficultyVisibility(index) {
            document.getElementById(`pDiff${index}`).style.display = (document.getElementById(`pType${index}`).value === "bot") ? "inline-block" : "none";
        }

        function applyTankStats(tank, size) {
            tank.size = size;
            if (size === "large") { tank.width = 24; tank.height = 13; tank.barrelLength = 16; tank.explosionRadius = 49; tank.damageMultiplier = 1.4; }
            else if (size === "small") { tank.width = 12; tank.height = 7; tank.barrelLength = 10; tank.explosionRadius = 24.5; tank.damageMultiplier = 0.7; }
            else { tank.width = 18; tank.height = 10; tank.barrelLength = 13; tank.explosionRadius = 35; tank.damageMultiplier = 1.0; }
        }

        function startGame() {
            players = [];
            let spacing = WIDTH / (playerCount + 1);
            for (let i = 0; i < playerCount; i++) {
                let name = document.getElementById(`pName${i}`).value || `טנק ${i+1}`;
                let newTank = { id: i, x: Math.floor(spacing * (i + 1)), y: 0, color: playerColors[i], angle: (i % 2 === 0 ? 45 : 135), power: 50, hp: 100, lives: 3, name: name, isBot: document.getElementById(`pType${i}`).value === "bot", difficulty: document.getElementById(`pDiff${i}`).value, selectedWeapon: "standard", ammo: { standard: Infinity, oil: 3, cluster: 3 } };
                applyTankStats(newTank, document.getElementById(`pSize${i}`).value);
                players.push(newTank);
            }
            uiOverlay.innerHTML = "";
            gameState = "PLAYING";
            generateTerrain();
        }

        function generateTerrain() {
            let baseHeight = HEIGHT * 0.7;
            for (let x = 0; x < WIDTH; x++) { terrain[x] = baseHeight + Math.sin(x * 0.005) * 50; }
            players.forEach(t => t.y = terrain[t.x]);
        }

        function drawPlane() {
            ctx.fillStyle = "#CCC";
            ctx.fillRect(plane.x, plane.y, 50, 15);
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("✈️", plane.x + 10, plane.y + 12);
        }

        function gameLoop() {
            if (gameState === "PLAYING") {
                // תנועת מטוס
                plane.x += plane.speed;
                if (plane.x > WIDTH) plane.x = -100;
            }

            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // רקע פשוט בשביל הבדיקה
            ctx.fillStyle = "#3399FF";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // אדמה
            ctx.fillStyle = "#8B5A2B";
            ctx.beginPath(); ctx.moveTo(0, HEIGHT);
            for (let x = 0; x < WIDTH; x++) ctx.lineTo(x, terrain[x]);
            ctx.lineTo(WIDTH, HEIGHT); ctx.fill();

            // ציור מטוס וטנקים
            drawPlane();
            players.forEach(t => {
                ctx.fillStyle = t.color;
                ctx.fillRect(t.x - 15, t.y - 20, 30, 20);
            });

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("keydown", (e) => { if(audioCtx.state === 'suspended') audioCtx.resume(); });

        showStartScreen();
        gameLoop();
    </script>
</body>
</html>
