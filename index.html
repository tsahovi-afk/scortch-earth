<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>טנקים נגד טנקים</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; display: none; }
        canvas { border: 3px solid #ffcc00; background-color: #050510; display: block; max-width: 100vw; height: auto; }
        .panel { background-color: #222; padding: 25px; border: 2px solid #ffcc00; border-radius: 10px; text-align: center; width: 380px; box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        button { background-color: #ffcc00; color: #000; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; margin: 10px; cursor: pointer; border-radius: 5px; }
        .color-dot { display: inline-block; width: 40px; height: 30px; margin: 5px; border: 2px solid #555; cursor: pointer; border-radius: 4px; }
        .color-dot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; }
        #status { color: #ffcc00; font-size: 20px; font-weight: bold; margin: 10px; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-panel" class="panel">
        <h2>📝 טנקים נגד טנקים</h2>
        <label>כינוי קרב:</label>
        <input type="text" id="player-name-input" value="צהובי" style="width:100%; padding:8px; margin-bottom:10px;">
        
        <label>בחר צבע מותג:</label>
        <div id="color-grid" style="margin-bottom:15px;">
            <div class="color-dot selected" style="background-color:#ffcc00" onclick="selectColor(this, '#ffcc00')"></div>
            <div class="color-dot" style="background-color:#ff3333" onclick="selectColor(this, '#ff3333')"></div>
            <div class="color-dot" style="background-color:#00ff00" onclick="selectColor(this, '#00ff00')"></div>
            <div class="color-dot" style="background-color:#33ccff" onclick="selectColor(this, '#33ccff')"></div>
            <div class="color-dot" style="background-color:#ffffff" onclick="selectColor(this, '#ffffff')"></div>
            <div class="color-dot" style="background-color:#111111; border: 2px dashed #ffcc00" onclick="selectColor(this, '#111111')"></div>
        </div>
        <button onclick="joinLobby()">התחבר ללובי</button>
    </div>

    <div id="lobby-panel" class="panel" style="display:none;">
        <h2>⚙️ הגדרות זירה</h2>
        <label>סה"כ שחקנים (אדם + מחשב):</label>
        <select id="total-players-select" style="width:100%; padding:8px;">
            <option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option>
        </select>
        <label>כמות בוטים (מחשב):</label>
        <select id="ai-players-select" style="width:100%; padding:8px;">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        </select>
        <button onclick="startGame()">שגר משחק!</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="status"></div>
    </div>

    <script>
        let socket, myId, gameActive = false, gamePlayers = {}, chosenColor = '#ffcc00';

        function selectColor(el, color) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            chosenColor = color;
        }

        function joinLobby() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('lobby-panel').style.display = 'block';
            socket = io();
            socket.emit('joinLobby', { name: document.getElementById('player-name-input').value, color: chosenColor });
        }

        function startGame() {
            socket.emit('startConfiguredGame', { 
                totalPlayers: document.getElementById('total-players-select').value, 
                aiCount: document.getElementById('ai-players-select').value 
            });
        }

        socket = io();
        socket.on('gameStarted', (data) => {
            gamePlayers = data.players;
            document.getElementById('lobby-panel').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            gameActive = true;
            draw();
        });

        function draw() {
            if(!gameActive) return;
            const ctx = document.getElementById('gameCanvas').getContext('2d');
            ctx.clearRect(0,0,800,500);
            ctx.fillStyle = '#3a2512'; ctx.fillRect(0, 400, 800, 100);
            for(let id in gamePlayers) {
                ctx.fillStyle = gamePlayers[id].color;
                ctx.fillRect(gamePlayers[id].x, 380, 20, 20);
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
