<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>טנקים נגד טנקים</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .panel { background: #222; padding: 20px; border: 2px solid #ffcc00; border-radius: 10px; text-align: center; width: 320px; }
        button { background: #ffcc00; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; margin: 5px 0; }
        .color-dot { display: inline-block; width: 35px; height: 25px; margin: 2px; border: 1px solid #555; cursor: pointer; }
        .color-dot.selected { border: 2px solid #fff; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; background: #333; color: white; border: 1px solid #555; }
        #game-container { position: relative; display: none; }
        canvas { border: 2px solid #ffcc00; background: #050510; }
    </style>
</head>
<body>

    <div id="login-panel" class="panel">
        <h2>טנקים נגד טנקים</h2>
        <input type="text" id="p-name" value="צהובי">
        <div id="color-grid">
            <div class="color-dot selected" style="background:#ffcc00" onclick="selectColor(this, '#ffcc00')"></div>
            <div class="color-dot" style="background:#ff3333" onclick="selectColor(this, '#ff3333')"></div>
            <div class="color-dot" style="background:#00ff00" onclick="selectColor(this, '#00ff00')"></div>
            <div class="color-dot" style="background:#33ccff" onclick="selectColor(this, '#33ccff')"></div>
            <div class="color-dot" style="background:#ffffff" onclick="selectColor(this, '#ffffff')"></div>
            <div class="color-dot" style="background:#444" onclick="selectColor(this, '#444')"></div>
        </div>
        <button onclick="joinLobby()">התחבר</button>
        <input type="text" id="share-link" readonly value="לינק לשיתוף">
        <button onclick="copyLink()">העתק לינק</button>
    </div>

    <div id="lobby-panel" class="panel" style="display:none;">
        <h3>הגדרות זירה</h3>
        <select id="total-players"><option value="2">2 שחקנים</option><option value="6">6 שחקנים</option></select>
        <select id="ai-count"><option value="0">0 בוטים</option><option value="5">5 בוטים</option></select>
        <button onclick="showTankSelection()">המשך</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        let chosenColor = '#ffcc00';
        let terrain = [];
        const TANK_SPECS = {
            medium: { w: 30, h: 20, gunW: 15, gunH: 4 },
            heavy:  { w: 45, h: 25, gunW: 20, gunH: 6 },
            light:  { w: 20, h: 15, gunW: 12, gunH: 3 }
        };

        function selectColor(el, color) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            chosenColor = color;
        }

        function joinLobby() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('lobby-panel').style.display = 'block';
        }

        function showTankSelection() {
            document.getElementById('lobby-panel').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            for(let x=0; x<800; x++) terrain[x] = 400 + Math.sin(x*0.02)*40;
            render();
        }

        function render() {
            const ctx = document.getElementById('gameCanvas').getContext('2d');
            ctx.fillStyle = '#050510'; ctx.fillRect(0,0,800,500);
            
            // ציור קרקע
            ctx.fillStyle = '#3a2512';
            ctx.beginPath(); ctx.moveTo(0, 500);
            for(let x=0; x<800; x++) ctx.lineTo(x, terrain[x]);
            ctx.lineTo(800, 500); ctx.fill();

            // ציור טנק לדוגמה (מבוסס על medium)
            let x = 100, specs = TANK_SPECS.medium;
            ctx.fillStyle = chosenColor;
            ctx.fillRect(x, terrain[x] - specs.h, specs.w, specs.h); // גוף
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + (specs.w/2) - (specs.gunW/2), terrain[x] - specs.h - specs.gunH, specs.gunW, specs.gunH); // קנה
            
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
