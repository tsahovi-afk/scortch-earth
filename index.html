<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>טנקים נגד טנקים - מהדורה מלאה</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; display: none; }
        canvas { border: 3px solid #ffcc00; background-color: #050510; display: block; max-width: 95vw; height: auto; }
        .ui-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; pointer-events: none; }
        .ui-panel { background: rgba(0,0,0,0.8); border: 2px solid #ffcc00; padding: 10px; border-radius: 5px; text-align: center; font-family: monospace; }
        .panel { background-color: #222; padding: 25px; border: 2px solid #ffcc00; border-radius: 10px; text-align: center; width: 350px; }
        button { background-color: #ffcc00; color: #000; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .color-dot { display: inline-block; width: 40px; height: 30px; margin: 5px; border: 2px solid #555; cursor: pointer; border-radius: 4px; }
        .color-dot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-panel" class="panel">
        <h2>📝 טנקים נגד טנקים</h2>
        <input type="text" id="player-name" value="צהובי" style="width:90%; padding:8px; margin-bottom:10px;">
        <div id="color-grid">
            <div class="color-dot selected" style="background:#ffcc00" onclick="selectColor(this, '#ffcc00')"></div>
            <div class="color-dot" style="background:#ff3333" onclick="selectColor(this, '#ff3333')"></div>
            <div class="color-dot" style="background:#00ff00" onclick="selectColor(this, '#00ff00')"></div>
            <div class="color-dot" style="background:#33ccff" onclick="selectColor(this, '#33ccff')"></div>
            <div class="color-dot" style="background:#fff" onclick="selectColor(this, '#fff')"></div>
            <div class="color-dot" style="background:#111; border: 2px dashed #ffcc00" onclick="selectColor(this, '#111')"></div>
        </div>
        <button onclick="joinLobby()">התחבר</button>
    </div>

    <div id="lobby-panel" class="panel" style="display:none;">
        <h2>⚙️ הגדרות זירה</h2>
        <select id="total-players"><option value="2">2 שחקנים</option><option value="6">6 שחקנים</option></select>
        <select id="ai-count"><option value="1">1 בוט</option><option value="5">5 בוטים</option></select>
        <button onclick="startGame()">שגר משחק!</button>
    </div>

    <div id="game-container">
        <div id="ui-bar" class="ui-bar"></div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        let socket, gameActive = false, players = {}, chosenColor = '#ffcc00', terrain = [], totalShots = 0, projectile = null;
        
        function selectColor(el, color) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            chosenColor = color;
        }

        function joinLobby() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('lobby-panel').style.display = 'block';
            socket = io();
            socket.emit('joinLobby', { name: document.getElementById('player-name').value, color: chosenColor });
        }

        function startGame() {
            socket.emit('startConfiguredGame', { totalPlayers: document.getElementById('total-players').value, aiCount: document.getElementById('ai-count').value });
        }

        socket = io();
        socket.on('gameStarted', (data) => {
            players = data.players;
            for(let x=0; x<800; x++) terrain[x] = 400 + Math.sin(x*0.01)*50;
            document.getElementById('lobby-panel').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            gameActive = true;
            draw();
        });

        socket.on('playerFired', (data) => {
            totalShots++;
            let p = players[data.id];
            projectile = { x: p.x, y: 360, vx: data.vx, vy: data.vy };
        });

        function draw() {
            if(!gameActive) return;
            const ctx = document.getElementById('gameCanvas').getContext('2d');
            
            // שמיים מתחלפים
            let grad = ctx.createLinearGradient(0,0,0,500);
            grad.addColorStop(0, totalShots % 2 === 0 ? '#2c3e50' : '#3498db');
            grad.addColorStop(1, '#000');
            ctx.fillStyle = grad; ctx.fillRect(0,0,800,500);

            // אדמה
            ctx.fillStyle = '#3a2512';
            ctx.beginPath(); ctx.moveTo(0, 500);
            for(let x=0; x<800; x++) ctx.lineTo(x, terrain[x]);
            ctx.lineTo(800, 500); ctx.fill();

            // טנקים
            for(let id in players) {
                let p = players[id];
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, terrain[p.x]-20, 30, 20); // גוף
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x+10, terrain[p.x]-30, 10, 10); // תותח
            }

            if(projectile) {
                projectile.x += projectile.vx; projectile.y += projectile.vy;
                ctx.fillStyle='red'; ctx.fillRect(projectile.x, projectile.y, 5, 5);
                if(projectile.y > 450) projectile = null;
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
